name: TDR Run Tests
on:
  pull_request:
  push:
    branches-ignore:
      - master
      - release-*
permissions:
  id-token: write
  contents: write
jobs:
  test:
    uses: nationalarchives/tdr-github-actions/.github/workflows/tdr_test.yml@e7b57a3bdf7863c951cd203101c6d566986376e3 # v.0.0.38
    with:
      repo-name: tdr-aws-utils
      test-command: |
        sbt clean test
    secrets:
      SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
